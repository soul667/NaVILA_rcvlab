## NaVILA + OLI Humanoid Robot Deployment
## Usage: docker compose -f docker-compose.oli.yml up -d

services:
  navila-core:
    image: ghcr.io/soul667/navila_rcvlab:cecd23c17e0e943465ebaebcf0c7c65d55de5031-jetson
    container_name: navila_core
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
    volumes:
      - ./navila_core/config/navila_params.yaml:/ros2_ws/config/navila_params.yaml:ro
    command: >
      ros2 launch navila_core navila.launch.py
      params_file:=/ros2_ws/config/navila_params.yaml
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  oli-bridge:
    image: ghcr.io/soul667/navila_rcvlab:cecd23c17e0e943465ebaebcf0c7c65d55de5031-jetson
    container_name: oli_bridge
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ./oli_bridge/config/oli_params.yaml:/ros2_ws/config/oli_params.yaml:ro
    command: >
      ros2 launch oli_bridge oli.launch.py
      params_file:=/ros2_ws/config/oli_params.yaml
    network_mode: host
    restart: unless-stopped
    depends_on:
      - navila-core

  foxglove-bridge:
    image: ghcr.io/soul667/navila_rcvlab:cecd23c17e0e943465ebaebcf0c7c65d55de5031-jetson
    container_name: foxglove_bridge
    environment:
      - ROS_DOMAIN_ID=0
    command: >
      ros2 launch foxglove_bridge foxglove_bridge_launch.xml
      port:=8765
    network_mode: host
    restart: unless-stopped
    depends_on:
      - navila-core
