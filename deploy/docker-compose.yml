services:
  navila-core:
    image: ghcr.io/soul667/navila-rcvlab:${TAG:-latest-jetson}
    container_name: navila_core
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
      - NAVILA_MODEL_ID=a8cheng/navila-llama3-8b-8f
      - NAVILA_MODEL_DIR=/models
    volumes:
      - ./config/navila_params.yaml:/ros2_ws/config/navila_params.yaml:ro
    command: >
      ros2 launch navila_core navila.launch.py
      params_file:=/ros2_ws/config/navila_params.yaml
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  limx-bridge:
    image: ghcr.io/soul667/navila-rcvlab:${TAG:-latest-jetson}
    container_name: limx_bridge
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ./config/limx_params.yaml:/ros2_ws/config/limx_params.yaml:ro
    command: >
      ros2 launch limx_bridge limx.launch.py
      params_file:=/ros2_ws/config/limx_params.yaml
    network_mode: host
    restart: unless-stopped
    depends_on:
      - navila-core

  foxglove-bridge:
    image: ghcr.io/soul667/navila-rcvlab:${TAG:-latest-jetson}
    container_name: foxglove_bridge
    environment:
      - ROS_DOMAIN_ID=0
    command: >
      ros2 launch foxglove_bridge foxglove_bridge_launch.xml
      port:=8765
    network_mode: host
    restart: unless-stopped
    depends_on:
      - navila-core

  rosboard:
    image: ghcr.io/dheera/rosboard:humble
    container_name: rosboard
    environment:
      - ROS_DOMAIN_ID=0
    network_mode: host
    restart: unless-stopped
    depends_on:
      - navila-core
